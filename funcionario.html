<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWER COINS - Painel do Funcionário</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/main.js"></script>
    <script src="sync_manager.js"></script>
    <script src="assets/js/flower-ind.js"></script>
    <script src="assets/js/monthly-reset.js"></script>
    <script>
        const BACKEND_URL = window.BACKEND_URL || 'https://backend.youware.com';
        // Usar variáveis globais já declaradas em main.js
        let employeeUser = null;
        let employeeStats = null;
        let employeeTasks = [];
        let employeeProgress = [];
        let employeePenalties = [];
        let employeeSync;
        let penaltiesListenerRegistered = false;
        let agninhaCloudCycleTimeout = null;
        let agninhaCloudHideTimeout = null;
        let agninhaCloudResumeTimeout = null;
        let agninhaLastCloudIndex = -1;
        const MONTH_NAMES_PT = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        // Inicializar sistema
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🌸 Iniciando painel do funcionário...');
            
            // Delegação de eventos para navegação do menu (funciona mesmo com CSP)
            const navMenu = document.querySelector('.nav-menu');
            if (navMenu) {
                navMenu.addEventListener('click', (evt) => {
                    const btn = evt.target.closest('.nav-button');
                    if (!btn) return;
                    evt.preventDefault();
                    const section = btn.getAttribute('data-section');
                    if (section === 'logout') {
                        logout();
                        return;
                    }
                    if (typeof window.showSection === 'function') {
                        window.showSection(section, btn);
                    }
                });
            }

            // Aguardar sync manager e sistema principal
            const waitForSync = setInterval(() => {
                if (window.getFlowerCoinsSync && window.getFlowerCoinsSync() && window.FLOWER_COINS) {
                    clearInterval(waitForSync);
                    employeeSync = window.getFlowerCoinsSync();
                    loadEmployeePanel();
                }
            }, 100);
        });

        async function loadEmployeePanel() {
            try {
                // Verificar se está logado ou usar dados de teste com OSIANE GOMES
                employeeUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                
                if (!employeeUser || !employeeUser.username) {
                    console.log('🧪 Simulando login com OSIANE GOMES para teste...');
                    employeeUser = {
                        username: 'OSIANE GOMES',
                        department: 'CONFECÇÃO',
                        is_admin: false,
                        avatar_url: null,
                        password_hash: 'PEDROB10'
                    };
                }

                const normalize = (s) => (s || '').normalize('NFD').replace(/\p{Diacritic}/gu, '').trim().toUpperCase();
                const allUsers = employeeSync.getCachedUsers ? employeeSync.getCachedUsers() : [];
                const matchedUser = allUsers.find(u => normalize(u.username) === normalize(employeeUser.username));
                if (matchedUser) {
                    employeeUser.id = matchedUser.id;
                    employeeUser.department = matchedUser.department;
                    employeeUser.avatar_url = matchedUser.avatar_url;
                }
                localStorage.setItem('currentUser', JSON.stringify(employeeUser));

                console.log('👤 Funcionário logado:', employeeUser.username);
                
                // Aguardar sincronização
                await employeeSync.fullSync();
                
                // Carregar dados do usuário
                await loadUserData();
                
                // Garantir sincronização inicial de penalidades
                if (employeeSync && typeof employeeSync.syncPenalties === 'function') {
                    await employeeSync.syncPenalties();
                }
                
                // Configurar listeners para penalidades
                setupPenaltiesListener();
                
                // Renderizar interface
                renderEmployeeInterface();
                
                // Configurar chat com saudação automática
                initializeChat();

                // Exibir frase motivacional diária
                // Frase motivacional será combinada no balão da Agninha

                
                console.log('✅ Painel do funcionário carregado!');
                
            } catch (error) {
                console.error('Erro ao carregar painel do funcionário:', error);
                showNotification('Erro ao carregar painel', 'error');
            }
        }

        async function loadUserData() {
            try {
                if (!employeeSync) return;

                employeeTasks = employeeSync.getCachedTasks();
                const allStats = employeeSync.getCachedStats();
                const allProgress = employeeSync.getCachedProgress();
                let allPenalties = typeof employeeSync.getCachedPenalties === 'function' ? employeeSync.getCachedPenalties() : [];
                const allUsers = employeeSync.getCachedUsers ? employeeSync.getCachedUsers() : [];

                // Resolver ID do funcionário por nome (tolerante a maiúsculas/acentos)
                const normalize = (s) => (s || '').normalize('NFD').replace(/\p{Diacritic}/gu, '').trim().toUpperCase();
                const nameKey = normalize(employeeUser.username);

                const matchedUser = allUsers.find(u => normalize(u.username) === nameKey);
                const resolvedId = matchedUser ? matchedUser.id : employeeUser.id;

                if (matchedUser) {
                    employeeUser.id = resolvedId;
                    localStorage.setItem('currentUser', JSON.stringify(employeeUser));
                }

                // Selecionar estatísticas pelo ID resolvido
                employeeStats = allStats.find(s => s.user_id === resolvedId) || {
                    user_id: resolvedId,
                    total_points: 0,
                    total_money: 0,
                    level_num: 1,
                    tasks_completed: 0,
                    current_streak: 0,
                    longest_streak: 0,
                    flower_coins_distributed: 0,
                    flowers_meta_distributed: 0
                };
                
                employeeProgress = allProgress.filter(p => p.user_id === resolvedId);

                allPenalties = Array.isArray(allPenalties) ? allPenalties : [];

                console.log('📥 Penalidades obtidas:', {
                    cache: allPenalties.length,
                    exemplos: allPenalties.slice(0, 3)
                });

                employeePenalties = buildEmployeePenalties(allPenalties);
                renderPenaltiesList();

                if (!employeePenalties.length) {
                    console.warn('⚠️ Nenhuma penalidade encontrada para o usuário', employeeUser.username, allPenalties);
                } else {
                    console.log('✅ Penalidades processadas para', employeeUser.username, employeePenalties);
                }

                console.log('📊 Dados do usuário carregados:', {
                    user: employeeUser.username,
                    stats: employeeStats,
                    tasks: employeeTasks.length,
                    progress: employeeProgress.length,
                    penalties: employeePenalties.length
                });
                
            } catch (error) {
                console.error('Erro ao carregar dados do usuário:', error);
            }
        }

        function setupPenaltiesListener() {
            if (penaltiesListenerRegistered) return;
            penaltiesListenerRegistered = true;

            window.addEventListener('flowerCoins:penaltiesUpdated', (event) => {
                if (!employeeUser) return;
                const updatedPenalties = Array.isArray(event.detail) ? event.detail : [];
                employeePenalties = buildEmployeePenalties(updatedPenalties);
                renderPenaltiesList();
                console.log('🔄 Penalidades atualizadas (evento):', updatedPenalties);
            });
        }

        function buildEmployeePenalties(allPenalties = []) {
            if (!employeeUser || !employeeUser.id) return [];

            const normalizedUserId = (employeeUser.id || '').toString();

            const filtered = (allPenalties || [])
                .filter(penalty => {
                    if (!penalty) return false;

                    const penaltyUserId = (penalty.user_id || '').toString();
                    const penaltyAction = (penalty.action || '').toLowerCase();

                    if (!penaltyUserId) return false;
                    if (penaltyUserId !== normalizedUserId) return false;
                    if (penaltyAction && penaltyAction !== 'deduct') return false;

                    return true;
                });

            if (!filtered.length) return [];

            const normalized = filtered
                .map(penalty => {
                    const rawDate = penalty.created_at || penalty.createdAt;
                    const parsedDate = rawDate ? new Date(rawDate) : new Date();
                    const monthIndex = parsedDate.getMonth();
                    const year = parsedDate.getFullYear();
                    const normalizedType = (penalty.type || '').toLowerCase();
                    const normalizedAmount = Number(penalty.amount || 0);
                    const normalizedReason = penalty.reason || '';
                    const adminName = penalty.admin_name || penalty.admin_full_name || penalty.admin_username || '';
                    return {
                        ...penalty,
                        parsedDate,
                        monthIndex,
                        year,
                        normalizedType,
                        normalizedAmount,
                        normalizedReason,
                        adminName,
                        uniqueKey: `${penalty.id || penalty.created_at || Date.now()}`
                    };
                })
                .sort((a, b) => b.parsedDate - a.parsedDate);

            const groupsMap = new Map();
            normalized.forEach(entry => {
                const key = `${entry.year}-${entry.monthIndex}`;
                if (!groupsMap.has(key)) {
                    groupsMap.set(key, {
                        key,
                        monthIndex: entry.monthIndex,
                        year: entry.year,
                        label: `${MONTH_NAMES_PT[entry.monthIndex]} de ${entry.year}`,
                        entries: []
                    });
                }
                groupsMap.get(key).entries.push(entry);
            });

            const groups = Array.from(groupsMap.values()).sort(
                (a, b) => new Date(b.year, b.monthIndex, 1) - new Date(a.year, a.monthIndex, 1)
            );

            groups.forEach(group => {
                group.entries.sort((a, b) => b.parsedDate - a.parsedDate);
            });

            return groups;
        }

        function formatPenaltyDetails(entry) {
            const normalizedType = (entry.normalizedType || entry.type || '').toLowerCase();
            const isFlowerCoins = normalizedType === 'flower_coins' || normalizedType === 'coins';
            const typeLabel = isFlowerCoins ? 'Flower Coins' : 'Flower Meta';
            const icon = isFlowerCoins ? '🪙 ' : '🌸 ';
            const amountNumber = Number(entry.normalizedAmount || entry.amount || 0);
            const amountLabel = isFlowerCoins
                ? `${amountNumber.toLocaleString('pt-BR')} pontos`
                : `${amountNumber.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} metas`;
            return { typeLabel, icon, amountLabel };
        }

        function escapeHtml(value) {
            if (!value) return '';
            return value.replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function renderPenaltiesList() {
            const container = document.getElementById('penaltiesList');
            if (!container) {
                console.warn('⚠️ penaltiesList não encontrado');
                return;
            }

            const groups = Array.isArray(employeePenalties) ? employeePenalties : [];

            if (!groups.length) {
                container.innerHTML = '<div class="penalty-empty">Nenhuma penalidade registrada até o momento.</div>';
                return;
            }

            container.innerHTML = groups.map(group => {
                const monthEntries = group.entries.map(entry => {
                    const detail = formatPenaltyDetails(entry);
                    const dateText = entry.parsedDate.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
                    const timeText = entry.parsedDate.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    const reasonText = escapeHtml(entry.normalizedReason || 'Sem motivo informado');
                    const adminName = escapeHtml(entry.admin_name || entry.admin_full_name || entry.admin_username || 'Admin');

                    return `
                        <div class="penalty-entry" data-penalty-key="${entry.uniqueKey || ''}">
                            <div>
                                <div class="penalty-entry-title">${detail.icon}${detail.typeLabel}</div>
                                <div class="penalty-entry-reason">${reasonText}</div>
                                <div class="penalty-entry-admin">Responsável: ${adminName}</div>
                            </div>
                            <div class="penalty-entry-date">
                                <div class="penalty-entry-amount">-${detail.amountLabel}</div>
                                <div>${dateText}</div>
                                <div>${timeText}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="penalty-group">
                        <div class="penalty-month-title">
                            <span>${group.label}</span>
                            <span>${group.entries.length} penalidade${group.entries.length > 1 ? 's' : ''}</span>
                        </div>
                        ${monthEntries}
                    </div>
                `;
            }).join('');
        }

        function renderEmployeeInterface() {
            updateProfileInfo();
            renderAvailableTasks();
            renderUserStats();
            renderRanking();
            renderPenaltiesList();
        }

        function updateProfileInfo() {
            const nameElement = document.getElementById('employeeName');
            const flowerCoinsElement = document.getElementById('flowerCoinsAmount');
            const flowerMetaElement = document.getElementById('flowerMetaAmount');
            const profilePicture = document.getElementById('profilePicture');

            if (nameElement) nameElement.textContent = employeeUser.username;
            
            // Mostrar contagens distribuídas (FC/FM) com fallback
            const coinsVal = Number(employeeStats.flower_coins_distributed ?? employeeStats.total_points ?? 0);
            const metaVal = Number(employeeStats.flowers_meta_distributed ?? employeeStats.meta_points ?? 0);
            if (flowerCoinsElement) flowerCoinsElement.textContent = coinsVal.toFixed(0);
            if (flowerMetaElement) flowerMetaElement.textContent = metaVal.toFixed(0);
            
            // Atualizar foto do perfil - buscar do usuário atual ou usar padrão
            if (profilePicture) {
                if (employeeUser.avatar_url && employeeUser.avatar_url.trim()) {
                    profilePicture.src = employeeUser.avatar_url;
                } else if (employeeUser.avatar && employeeUser.avatar.trim()) {
                    profilePicture.src = employeeUser.avatar;
                } else {
                    // Foto padrão baseada na primeira letra do nome
                    profilePicture.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(employeeUser.username)}&size=120&background=ff6b9d&color=ffffff&font-size=0.4`;
                }
            }
        }

        function renderAvailableTasks() {
            const container = document.getElementById('tasksList');
            if (!container) return;

            const today = new Date().toISOString().split('T')[0];

            const safeTasks = Array.isArray(employeeTasks) ? employeeTasks : [];
            const tasksHtml = safeTasks.map(task => {
                const completedToday = employeeProgress.some(p => 
                    p.task_id === task.id && p.completed_at && p.completed_at.startsWith(today)
                );

                return `
                    <div class="task-item ${completedToday ? 'completed' : ''}">
                        <div class="task-header">
                            <div class="task-title">${task.title || 'Tarefa'}</div>
                            <div class="task-points">${task.points ?? 0} pontos</div>
                        </div>
                        <div class="task-description">${task.description || ''}</div>
                        <div class="task-footer">
                            <div class="task-status">
                                ${completedToday ? 
                                    '<span style="color: #4CAF50; font-weight: bold; font-size: 0.9rem;">✓ Tarefa Concluída Hoje</span>' : 
                                    '<span style="color: #666; font-size: 0.9rem;">📋 Tarefa Disponível</span>'
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = tasksHtml || '<div class="task-item">Nenhuma tarefa disponível no momento.</div>';
        }

        // Flower Meta tasks (employee-specific)
        async function renderMetaTasks() {
            const container = document.getElementById('tasksMetaList');
            if (!container) return;

            // Prefer sync cache (Supabase). Fallback to backend endpoint
            let metaTasks = [];
            try {
                if (employeeSync && typeof employeeSync.getCachedMetaTasks === 'function') {
                    const cached = employeeSync.getCachedMetaTasks();
                    const userId = (employeeUser?.id || '').toString();
                    metaTasks = (cached || []).filter(t => (t.assigned_to_user_id || '').toString() === userId);
                }
            } catch (e) { console.warn('Cache meta tasks indisponível', e); }

            if ((!metaTasks || metaTasks.length === 0) && typeof BACKEND_URL !== 'undefined') {
                try {
                    const userId = (employeeUser?.id || '').toString();
                    const resp = await fetch(`${BACKEND_URL}/api/meta-tasks?user_id=${encodeURIComponent(userId)}`);
                    if (resp.ok) {
                        const result = await resp.json();
                        metaTasks = (result.tasks || []).filter(t => (t.assigned_to_user_id || '').toString() === userId);
                    }
                } catch (e) { console.warn('Falha ao buscar meta tasks no backend', e); }
            }

            if (!Array.isArray(metaTasks) || metaTasks.length === 0) {
                container.innerHTML = '<div class="task-item">Nenhuma tarefa Meta disponível para você.</div>';
                return;
            }

            const html = metaTasks.map((task) => {
                const isCompleted = !!task.is_completed;
                const points = task.points ?? task.flower_meta ?? 0;
                return `
                    <div class="task-item ${isCompleted ? 'completed' : ''}" data-meta-id="${task.id}">
                        <div class="task-header">
                            <div class="task-title">${task.title || 'Tarefa Meta'}</div>
                            <div class="task-points">⭐ ${points} meta</div>
                        </div>
                        <div class="task-description">${task.description || ''}</div>
                        <div class="task-footer">
                            ${isCompleted ? 
                                '<span style="color: #4CAF50; font-weight: bold; font-size: 0.9rem;">✓ Concluída</span>' : 
                                `<button class="complete-task-btn" onclick="completeMetaTask('${task.id}', ${points})">Concluir</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        async function completeMetaTask(metaTaskId, points) {
            try {
                // Prefer Supabase: marcar como concluída e somar pontos Meta
                if (employeeSync && employeeUser?.id) {
                    const supabaseClient = employeeSync.client;
                    await supabaseClient.from('meta_tasks')
                        .update({ is_completed: true, completed_at: new Date().toISOString() })
                        .eq('id', metaTaskId);

                    // Atualizar estatísticas: flowers_meta_distributed
                    const { data: stats } = await supabaseClient
                        .from('user_stats')
                        .select('*')
                        .eq('user_id', employeeUser.id)
                        .single();

                    const newMeta = (stats?.flowers_meta_distributed || 0) + (points || 0);
                    await supabaseClient
                        .from('user_stats')
                        .update({ flowers_meta_distributed: newMeta, updated_at: new Date().toISOString() })
                        .eq('user_id', employeeUser.id);

                    await employeeSync.syncUserStats();
                    await employeeSync.syncMetaTasks?.();
                } else if (typeof BACKEND_URL !== 'undefined') {
                    // Fallback to backend
                    await fetch(`${BACKEND_URL}/api/meta-tasks/complete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: metaTaskId })
                    });
                }

                showNotification('Tarefa Meta concluída! ⭐', 'success');
                renderMetaTasks();
            } catch (error) {
                console.error('Erro ao concluir meta task:', error);
                showNotification('Erro ao concluir tarefa Meta', 'error');
            }
        }

        function renderUserStats() {
            const pointsInLevel = employeeStats.total_points % 100;
            const progressPercent = (pointsInLevel / 100) * 100;
            
            // Atualizar barra de progresso de nível
            const progressBar = document.querySelector('.level-progress-bar');
            if (progressBar) {
                progressBar.style.width = progressPercent + '%';
            }

            // Atualizar texto do progresso
            const progressText = document.querySelector('.level-progress-text');
            if (progressText) {
                progressText.textContent = `${pointsInLevel}/100 para próximo nível`;
            }
        }

        function renderRanking() {
            const container = document.getElementById('rankingList');
            if (!container) {
                console.error('❌ Container rankingList não encontrado');
                return;
            }

            console.log('🏆 Renderizando ranking...');

            if (!employeeSync) {
                console.error('❌ employeeSync não disponível');
                container.innerHTML = '<div style="color: #fff; text-align: center; padding: 2rem;">Sistema de sincronização não disponível</div>';
                return;
            }

            const allStats = employeeSync.getCachedStats();
            const allUsers = employeeSync.getCachedUsers();
            
            console.log('📊 Dados para ranking:', {
                stats: allStats.length,
                users: allUsers.length
            });
            
            const ranking = allStats
                .filter(stat => {
                    const user = allUsers.find(u => u.id === stat.user_id);
                    return user && !user.is_admin;
                })
                .sort((a, b) => (b.total_points || 0) - (a.total_points || 0))
                .slice(0, 10);

            console.log('🏅 Ranking processado:', ranking.length, 'funcionários');

            if (ranking.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: #fff;">
                        <h4 style="margin-bottom: 1rem;">🏆 Ranking Vazio</h4>
                        <p>Complete tarefas para aparecer no ranking!</p>
                        <p style="font-size: 0.9rem; opacity: 0.7; margin-top: 0.5rem;">Dados: ${allUsers.length} usuários, ${allStats.length} estatísticas</p>
                    </div>
                `;
                return;
            }

            const rankingHtml = ranking.map((stat, index) => {
                const user = allUsers.find(u => u.id === stat.user_id);
                if (!user) return '';

                const isCurrentUser = user.id === employeeUser.id;
                const medal = index < 3 ? ['🥇', '🥈', '🥉'][index] : `${index + 1}º`;
                
                return `
                    <div style="
                        background: ${isCurrentUser ? 'rgba(255, 215, 0, 0.2)' : 'rgba(255, 255, 255, 0.1)'};
                        border: ${isCurrentUser ? '2px solid #FFD700' : '1px solid rgba(255, 255, 255, 0.2)'};
                        border-radius: 10px;
                        padding: 1rem;
                        margin-bottom: 0.5rem;
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                    ">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="font-size: 1.2rem; font-weight: bold; color: #FFD700; min-width: 40px;">
                                ${medal}
                            </div>
                            <div>
                                <div style="font-weight: bold; color: ${isCurrentUser ? '#FFD700' : '#fff'}; font-size: 1rem;">
                                    ${user.username} ${isCurrentUser ? '(Você)' : ''}
                                </div>
                                <div style="font-size: 0.8rem; color: rgba(255, 255, 255, 0.7);">
                                    ${user.department || 'Funcionário'}
                                </div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: bold; color: #fff; font-size: 1.1rem;">
                                ${stat.total_points || 0} pts
                            </div>
                            <div style="font-size: 0.8rem; color: #4CAF50;">
                                ${stat.tasks_completed || 0} tarefas
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = rankingHtml;
            console.log('✅ Ranking renderizado com sucesso!');
        }

        // Adicionar funções de navegação entre seções
        function handleSectionChange(sectionName, triggerButton) {
            document.querySelectorAll('.content-section').forEach(section => {
                if (section) section.classList.add('hidden');
            });

            if (sectionName === 'tasks') {
                const tasksSection = document.getElementById('tasksSection');
                if (tasksSection) tasksSection.classList.remove('hidden');
            } else if (sectionName === 'tasks-meta') {
                const tasksMetaSection = document.getElementById('tasksMetaSection');
                if (tasksMetaSection) tasksMetaSection.classList.remove('hidden');
            }

            const targetSection = document.getElementById(`${sectionName}Section`);
            if (targetSection) {
                targetSection.classList.remove('hidden');
            }

            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));

            let activeButton = triggerButton;
            if (!activeButton) {
                activeButton = document.querySelector(`.nav-button[data-section="${sectionName}"]`);
            }
            if (!activeButton) {
                activeButton = document.querySelector('.nav-button[data-section="tasks"]');
            }
            if (activeButton) {
                activeButton.classList.add('active');
            }

            if (sectionName === 'tasks') {
                renderAvailableTasks();
            } else if (sectionName === 'tasks-meta') {
                renderMetaTasks();
            } else if (sectionName === 'penalties') {
                renderPenaltiesList();
            }
        }

        // Funções de foto do perfil
        function changeProfilePicture() {
            document.getElementById('profilePictureInput').click();
        }

        async function handleProfilePictureChange(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validar tipo de arquivo
            if (!file.type.startsWith('image/')) {
                showNotification('Por favor, selecione apenas arquivos de imagem', 'error');
                return;
            }

            // Validar tamanho (máx 5MB)
            if (file.size > 5 * 1024 * 1024) {
                showNotification('A imagem deve ter no máximo 5MB', 'error');
                return;
            }

            try {
                // Converter para base64
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64Image = e.target.result;

        async function initializeChat() {
            console.log('💬 Agninha preparando mensagem...');

            const balloon = document.querySelector('.agninha-speech__balloon');
            const closeButton = document.querySelector('.agninha-speech__close');
            const avatar = document.querySelector('.agninha-speech__avatar');
            const coinButton = document.querySelector('[data-explain="coin"]');
            const metaButton = document.querySelector('[data-explain="meta"]');
            const explanationButtons = [coinButton, metaButton];
            const initialMessage = 'Escolha uma das opções para saber como o FLOWER COINS funciona.';
            const explanations = {
                coin: 'Os Flower Coin são conquistados ao não faltar, não atrasar e manter seu ambiente de trabalho limpo. Aqui você pode acompanhar o seu progresso ao decorrer do mês.',
                meta: 'O Flower Meta é conquistado através de suas metas e obrigações concluídas. No final do mês esses pontos são recebidos como dinheiro, com cada ponto valendo R$ 1,00.'
            };
            const cloudBox = ensureCloudBox();

            stopCloudMessages();

            if (balloon) {
                balloon.classList.add('agninha-speech__balloon-hidden');
            }

            const setActiveButton = (activeBtn) => {
                explanationButtons.forEach(btn => btn?.classList.remove('is-active'));
                if (activeBtn) {
                    activeBtn.classList.add('is-active');
                }
            };

            const ensureBalloonVisible = () => {
                if (balloon) {
                    balloon.classList.remove('agninha-speech__balloon-hidden');
                }
            };

            const handleExplanation = (type, button) => {
                ensureBalloonVisible();
                setActiveButton(button);
                updateAgninhaMessage(explanations[type] || initialMessage);
            };

            if (closeButton) {
                closeButton.addEventListener('click', () => {
                    if (balloon) balloon.classList.add('agninha-speech__balloon-hidden');
                    setActiveButton(null);
                    updateAgninhaMessage(initialMessage);
                    resumeCloudMessages(cloudBox);
                    const styleMarker = document.getElementById('agninha-hidden-style');
                    if (!styleMarker) {
                        const styleEl = document.createElement('style');
                        styleEl.id = 'agninha-hidden-style';
                        styleEl.textContent = '.agninha-speech__balloon-hidden { opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(10px); transition: opacity 0.25s ease, transform 0.25s ease; }';
                        document.head.appendChild(styleEl);
                    }
                });
            }

            if (avatar) {
                avatar.addEventListener('click', () => {
                    if (!balloon) return;
                    const isHidden = balloon.classList.contains('agninha-speech__balloon-hidden');
                    if (isHidden) {
                        balloon.classList.remove('agninha-speech__balloon-hidden');
                        setActiveButton(null);
                        updateAgninhaMessage(initialMessage);
                    } else {
                        balloon.classList.add('agninha-speech__balloon-hidden');
                    }
                });
            }

            if (coinButton) {
                coinButton.addEventListener('click', () => handleExplanation('coin', coinButton));
            }
            if (metaButton) {
                metaButton.addEventListener('click', () => handleExplanation('meta', metaButton));
            }

            updateAgninhaMessage(initialMessage);
            startCloudMessages(cloudBox);
        }

        function getCloudMessagePhrase(previousIndex = -1) {
            const phrases = getAgninhaPhilosophicalPhrases();
            if (!phrases.length) return 'Vamos continuar firmes nas metas!';
            let nextIndex = Math.floor(Math.random() * phrases.length);
            if (phrases.length > 1 && nextIndex === previousIndex) {
                nextIndex = (nextIndex + 1) % phrases.length;
            }
            return { text: phrases[nextIndex], index: nextIndex };
        }

        function getTimeOfDayLabel(hour) {
            if (hour >= 5 && hour < 12) return { label: 'manhã', key: 'morning', greeting: '🌅 Bom dia' };

            return { label: 'noite', key: 'evening', greeting: '🌙 Boa noite' };
        }

        function ensureCloudBox() {
            let cloudContainer = document.querySelector('.agninha-cloud-box');
            if (!cloudContainer) {
                cloudContainer = document.createElement('div');
                cloudContainer.className = 'agninha-cloud-box agninha-cloud-box-hidden';
                cloudContainer.innerHTML = `
                    <div class="agninha-cloud-box__content">
                        <p class="agninha-cloud-box__text"></p>
                    </div>
                `;
                const agninhaWrapper = document.querySelector('.agninha-speech');
                if (agninhaWrapper) {
                    agninhaWrapper.appendChild(cloudContainer);
                }
            }
            return cloudContainer;
        }

        function updateCloudBoxMessage(cloudBox, phrase) {
            if (!cloudBox) return;
            const textElement = cloudBox.querySelector('.agninha-cloud-box__text');
            if (textElement) {
                textElement.textContent = phrase;
            }
            cloudBox.classList.remove('agninha-cloud-box-hidden');
            cloudBox.classList.add('agninha-cloud-box-visible');
        }

        function hideCloudBox(cloudBox) {
            if (!cloudBox) return;
            cloudBox.classList.remove('agninha-cloud-box-visible');
            cloudBox.classList.add('agninha-cloud-box-hidden');
        }

        function runCloudCycle(cloudBox) {
            clearTimeout(agninhaCloudCycleTimeout);
            clearTimeout(agninhaCloudHideTimeout);
            clearTimeout(agninhaCloudResumeTimeout);

            if (!cloudBox) return;

            const { text, index } = getCloudMessagePhrase(agninhaLastCloudIndex);
            agninhaLastCloudIndex = index;
            updateCloudBoxMessage(cloudBox, text);

            agninhaCloudHideTimeout = setTimeout(() => {
                hideCloudBox(cloudBox);
            }, 10000);

            agninhaCloudCycleTimeout = setTimeout(() => {
                runCloudCycle(cloudBox);
            }, 40000);
        }

        function startCloudMessages(cloudBox) {
            if (!cloudBox) return;
            runCloudCycle(cloudBox);
        }

        function stopCloudMessages() {
            clearTimeout(agninhaCloudCycleTimeout);
            clearTimeout(agninhaCloudHideTimeout);
            clearTimeout(agninhaCloudResumeTimeout);
            agninhaCloudCycleTimeout = null;
            agninhaCloudHideTimeout = null;
            agninhaCloudResumeTimeout = null;
            const cloudBox = document.querySelector('.agninha-cloud-box');
            hideCloudBox(cloudBox);
        }

        function resumeCloudMessages(cloudBox) {
            stopCloudMessages();
            agninhaCloudResumeTimeout = setTimeout(() => {
                startCloudMessages(cloudBox);
            }, 40000);
        }

        function getFallbackMotivation() {
            const now = new Date();
            const { key, greeting } = getTimeOfDayLabel(now.getHours());
            const dayIndex = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            const phrases = window.FLORzinhaFallbacks?.dailyPhrases || [];
            const greetingOptions = window.FLORzinhaFallbacks?.greetingsByTime?.[key] || [greeting];
            const phrase = phrases.length ? phrases[dayIndex % phrases.length] : `${greeting}! É hora de brilhar hoje!`;
            const randomGreeting = greetingOptions[Math.floor(Math.random() * greetingOptions.length)] || greeting;
            return `${randomGreeting}! ${phrase}`;
        }

            transform: translate(0, 0);

        .nav-menu {

            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;

        .nav-button {

        async function legacyBackendGenerateCalendar() {
            const monthNames = [
                'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
            ];

            document.getElementById('currentMonthYear').textContent = `${monthNames[currentMonth]} ${currentYear}`;

            // Calcular pontos mensais baseado no progresso de tarefas do usuário
            let monthlyFlowerCoins = 0;
            let monthlyFlowerMeta = 0;
            let dailyProgress = {};
            
            try {
                // Buscar progresso do usuário para este mês
                const startOfMonth = new Date(currentYear, currentMonth, 1).toISOString();
                const endOfMonth = new Date(currentYear, currentMonth + 1, 0, 23, 59, 59).toISOString();
                
                console.log('📅 Buscando progresso entre:', startOfMonth, 'e', endOfMonth);
                
                // Obter progresso do sync manager
                const allProgress = employeeSync.getCachedProgress();
                const monthProgress = allProgress.filter(progress => 
                    progress.user_id === employeeUser.id &&
                    progress.completed_at >= startOfMonth &&
                    progress.completed_at <= endOfMonth
                );
                
                console.log('📊 Progresso do mês encontrado:', monthProgress.length, 'tarefas');
                
                // Calcular pontos por dia
                monthProgress.forEach(progress => {
                    const completedDate = new Date(progress.completed_at);
                    const dayKey = completedDate.getDate();
                    
                    if (!dailyProgress[dayKey]) {
                        dailyProgress[dayKey] = {
                            flower_coins: 0,
                            flower_meta: 0,
                            tasks_completed: 0
                        };
                    }
                    
                    // Todos os pontos são considerados flower coins por padrão
                    dailyProgress[dayKey].flower_coins += progress.points_earned || 0;
                    dailyProgress[dayKey].tasks_completed += 1;
                    
                    monthlyFlowerCoins += progress.points_earned || 0;
                });
                
                // Buscar flowers meta distribuídos pelo admin para este mês
                const userStats = employeeSync.getCachedStats().find(s => s.user_id === employeeUser.id);
                if (userStats) {
                    monthlyFlowerMeta = userStats.flowers_meta_distributed || 0;
                }
                
                console.log('💰 Total do mês - Flower Coins:', monthlyFlowerCoins, 'Flowers Meta:', monthlyFlowerMeta);
                
            } catch (error) {
                console.error('Erro ao calcular dados mensais:', error);
            }

            // Calendário simplificado mostrando apenas resumo mensal
            const calendarGrid = document.getElementById('calendarGrid');
            
            const calendarHTML = `
                <div style="text-align: center; padding: 1rem;">
                    <div style="background: rgba(255, 255, 255, 0.15); border-radius: 15px; padding: 1.5rem; max-width: 350px; margin: 0 auto;">

                                📅
                            </div>
                            <h4 style="color: #fff; font-size: 1.4rem; font-weight: bold; margin: 0;">
                                ${monthNames[currentMonth]} ${currentYear}
                            </h4>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div style="background: rgba(255, 215, 0, 0.2); border-radius: 10px; padding: 1rem; text-align: center;">
                                <img src="assets/img/flower-coin-new.png" style="width: 24px; height: 24px; margin-bottom: 0.5rem;" alt="FC">
                                <div style="color: #FFD700; font-weight: bold; font-size: 1.3rem;">${monthlyFlowerCoins}</div>
                                <div style="color: #fff; font-size: 0.75rem; opacity: 0.9;">Flower Coins</div>
                            </div>
                            <div style="background: rgba(76, 175, 80, 0.2); border-radius: 10px; padding: 1rem; text-align: center;">
                                <img src="assets/img/flower-meta-new.png" style="width: 24px; height: 24px; margin-bottom: 0.5rem;" alt="FM">
                                <div style="color: #4CAF50; font-weight: bold; font-size: 1.3rem;">${monthlyFlowerMeta}</div>
                                <div style="color: #fff; font-size: 0.75rem; opacity: 0.9;">Flower Meta</div>
                            </div>
                        </div>
                        
                        ${currentMonth === new Date().getMonth() && currentYear === new Date().getFullYear() ? 
                            '<div style="background: rgba(255, 107, 107, 0.2); border-radius: 8px; padding: 0.75rem; color: #fff; font-size: 0.8rem;"><span style="margin-right: 0.5rem;">⚠️</span>Mês atual - Pontos zerarão dia 1º do próximo mês</div>' :

        async function handleProfilePictureChange(event) {
            const file = event.target.files[0];
            if (file) {
                try {
                    // Check file size (limit to ~1MB before base64 encoding)
                    if (file.size > 1024 * 1024) {
                        alert('Imagem muito grande. Por favor, escolha uma imagem menor que 1MB.');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        const photoData = e.target.result;
                        
                        // Update UI immediately
                        document.getElementById('profilePicture').src = photoData;
                        
                        // Save to backend with proper authentication
                        try {
                            // For now, save directly to localStorage since we have test users
                            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
                            currentUser.profile_photo = photoData;
                            localStorage.setItem('currentUser', JSON.stringify(currentUser));
                            
                            // Try to save to backend if possible
                            try {
                                const userInfo = await getUserInfo();
                                if (userInfo && userInfo.encrypted_yw_id) {
                                    const response = await fetch(`${BACKEND_URL}/api/user/photo`, {
                                        method: 'POST',
                                        headers: {
                                            'Content-Type': 'application/json',
                                            'X-Encrypted-Yw-ID': userInfo.encrypted_yw_id
                                        },
                                        body: JSON.stringify({ photoData })
                                    });

                                    if (response.ok) {
                                        const result = await response.json();
                                        if (result.success) {
                                            console.log('✅ Foto salva no backend com sucesso!');
                                        }
                                    }
                                }
                            } catch (backendError) {
                                console.log('⚠️ Backend não disponível, foto salva localmente');
                            }
                            
                            // Show success message
                            console.log('✅ Foto de perfil salva com sucesso!');
                        } catch (error) {
                            console.error('Erro ao salvar foto:', error);
                            alert('Erro de conexão ao salvar foto.');
                        }
                    };
                    reader.readAsDataURL(file);
                } catch (error) {
                    console.error('Erro ao processar imagem:', error);
                    alert('Erro ao processar imagem.');
                }
            }
        }

        function showMotivationalMessage() {
            const popup = document.getElementById('motivationalPopup');
            const messageDiv = document.getElementById('motivationalMessage');
            
            // Determinar saudação por horário
            const currentHour = new Date().getHours();
            let timeOfDay;
            if (currentHour >= 5 && currentHour < 12) {
                timeOfDay = 'morning';
            } else if (currentHour >= 12 && currentHour < 18) {
                timeOfDay = 'afternoon';
            } else {
                timeOfDay = 'evening';
            }
            
            // Selecionar saudação aleatória do período
            const greetings = greetingsByTime[timeOfDay];
            const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            
            // Selecionar frase do dia baseada na data (mesma frase para o mesmo dia)
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const dailyPhrase = dailyMotivationalPhrases[dayOfYear % dailyMotivationalPhrases.length];
            
            // Combinar saudação com frase do dia
            const fullMessage = randomGreeting + "\n\n" + dailyPhrase;
            
            messageDiv.innerHTML = fullMessage.replace(/\n/g, '<br>');
            popup.style.display = 'block';

            // Auto hide after 10 seconds (mais tempo para ler)
            setTimeout(() => {
                hideMotivationalMessage();
            }, 10000);
        }

        function hideMotivationalMessage() {
            document.getElementById('motivationalPopup').style.display = 'none';
        }

        function showMotivationalMessageOnLogin() {
            // Show motivational message after 2 seconds on login
            setTimeout(() => {
                showMotivationalMessage();
            }, 2000);
        }

        // Função para gerar avatar SVG
        function generateAvatarSVG(name) {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8'];
            const initial = name ? name.charAt(0).toUpperCase() : '?';
            const color = colors[name ? name.length % colors.length : 0];
            
            return `data:image/svg+xml;base64,${btoa(`
                <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="30" fill="${color}"/>
                    <text x="30" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="bold">${initial}</text>
                </svg>
            `)}`;
        }
